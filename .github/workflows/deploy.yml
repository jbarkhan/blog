name: deploy-hugo-site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true
      - name: Build
        run: hugo --minify --baseURL "https://nullthought.dev/"
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          cname: nullthought.dev
          user_name: jbarkhan
          user_email: jbarkhan@users.noreply.github.com
      - name: Notify IndexNow
        run: |
          KEY="3c17b266e9417b30bde8ea9b30f7ce70"
          URL_LIST=$(grep -oP '(?<=<loc>)[^<]+' public/sitemap.xml | jq -R . | jq -s .)
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
                --arg host "nullthought.dev" \
                --arg key "$KEY" \
                --arg keyLocation "https://nullthought.dev/$KEY.txt" \
                --argjson urlList "$URL_LIST" \
                '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')"